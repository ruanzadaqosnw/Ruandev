name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Swift
      uses: swift-actions/setup-swift@v1
      with:
        swift-version: '5.9'

    - name: Build App and Dylib
      run: |
        chmod +x build_ipa.sh
        ./build_ipa.sh

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RuanDevAPIServer-IPA
        path: RuanDevAPIServer.ipa
