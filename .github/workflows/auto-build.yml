name: Auto Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup Xcode
      run: |
        xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: Install Dependencies
      run: |
        cd Backend
        npm install
        cd ..
    
    - name: Generate Xcode Project
      run: |
        swift package generate-xcodeproj
        ls -la
    
    - name: Build for iOS
      run: |
        mkdir -p build/derived
        
        xcodebuild -scheme RuanDevAPIServer \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build/derived \
          -arch arm64 \
          build 2>&1 | tee build.log
    
    - name: Check Build Output
      run: |
        echo "=== Build Output ==="
        cat build.log
        echo ""
        echo "=== Directory Structure ==="
        find build/derived -name "*.app" -type d
    
    - name: Create IPA
      run: |
        mkdir -p build/ipa/Payload
        
        # Encontrar o app compilado
        APP_PATH=$(find build/derived -name "RuanDevAPIServer.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ App não encontrado!"
          echo "Procurando por .app:"
          find build -name "*.app" -type d
          exit 1
        fi
        
        echo "✅ App encontrado em: $APP_PATH"
        
        # Copiar app
        cp -r "$APP_PATH" build/ipa/Payload/
        
        # Criar IPA
        cd build/ipa
        zip -r ../RuanDevAPIServer.ipa Payload/
        cd ../..
        
        # Verificar
        ls -lh build/RuanDevAPIServer.ipa
    
    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: RuanDevAPIServer.ipa
        path: build/RuanDevAPIServer.ipa
        retention-days: 90
    
    - name: Display IPA Info
      if: success()
      run: |
        echo "📱 IPA Compilado com Sucesso!"
        echo ""
        echo "Arquivo: RuanDevAPIServer.ipa"
        ls -lh build/RuanDevAPIServer.ipa
        echo ""
        echo "Conteúdo:"
        unzip -l build/RuanDevAPIServer.ipa | head -20
