name: Auto Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup
      run: |
        xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: Generate Project
      run: swift package generate-xcodeproj
    
    - name: Build App
      run: |
        xcodebuild -scheme RuanDevAPIServer \
          -configuration Release \
          -sdk iphoneos \
          -arch arm64 \
          -derivedDataPath build \
          build
    
    - name: Package IPA
      run: |
        mkdir -p build/ipa/Payload
        cp -r build/Build/Products/Release-iphoneos/RuanDevAPIServer.app build/ipa/Payload/
        cd build/ipa && zip -r ../RuanDevAPIServer.ipa Payload/ && cd ../..
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: RuanDevAPIServer.ipa
        path: build/RuanDevAPIServer.ipa
        retention-days: 90
    
    - name: Get IPA Info
      run: |
        echo "📱 IPA gerado com sucesso!"
        ls -lh build/RuanDevAPIServer.ipa
        file build/RuanDevAPIServer.ipa
        unzip -l build/RuanDevAPIServer.ipa | head -15
    
    - name: Create Release
      if: success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      if: success()
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./build/RuanDevAPIServer.ipa
        asset_name: RuanDevAPIServer-arm64.ipa
        asset_content_type: application/octet-stream
