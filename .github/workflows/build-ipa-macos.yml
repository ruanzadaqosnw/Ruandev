name: Build IPA (macOS)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Xcode
      run: |
        sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: Install dependencies
      run: |
        cd Backend
        npm install
        cd ..
    
    - name: Build for iOS
      run: |
        # Criar diretório de build
        mkdir -p build
        
        # Gerar projeto Xcode
        swift package generate-xcodeproj
        
        # Compilar
        xcodebuild -scheme RuanDevAPIServer \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build/derived \
          -arch arm64 \
          build
    
    - name: Create IPA Structure
      run: |
        # Criar estrutura do IPA
        mkdir -p build/ipa/Payload
        
        # Copiar app compilado
        APP_PATH="build/derived/Build/Products/Release-iphoneos/RuanDevAPIServer.app"
        
        if [ -d "$APP_PATH" ]; then
          cp -r "$APP_PATH" build/ipa/Payload/
          echo "✅ App copiado com sucesso"
        else
          echo "❌ App não encontrado em $APP_PATH"
          find build -name "*.app" -type d
          exit 1
        fi
    
    - name: Package IPA
      run: |
        cd build/ipa
        zip -r ../RuanDevAPIServer.ipa Payload/
        cd ../..
        
        # Verificar
        if [ -f "build/RuanDevAPIServer.ipa" ]; then
          echo "✅ IPA criado com sucesso!"
          ls -lh build/RuanDevAPIServer.ipa
          file build/RuanDevAPIServer.ipa
        else
          echo "❌ Erro ao criar IPA"
          exit 1
        fi
    
    - name: Upload IPA as artifact
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: RuanDevAPIServer-arm64.ipa
        path: build/RuanDevAPIServer.ipa
        retention-days: 90
    
    - name: Create Release
      if: success() && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/RuanDevAPIServer.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
