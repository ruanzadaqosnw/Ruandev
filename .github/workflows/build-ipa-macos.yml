name: Build IPA (macOS)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Xcode
      run: |
        sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: Install Swift dependencies
      run: |
        cd Backend
        npm install
        cd ..
    
    - name: Generate Xcode Project
      run: |
        swift package generate-xcodeproj
    
    - name: Build for iOS
      run: |
        xcodebuild -scheme RuanDevAPIServer \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          -arch arm64 \
          -allowProvisioningUpdates \
          build
    
    - name: Create IPA
      run: |
        mkdir -p build/ipa/Payload
        
        # Copiar o app compilado
        cp -r build/Build/Products/Release-iphoneos/RuanDevAPIServer.app \
          build/ipa/Payload/
        
        # Criar o IPA
        cd build/ipa
        zip -r ../RuanDevAPIServer.ipa Payload/
        cd ../..
        
        # Verificar se foi criado
        if [ -f "build/RuanDevAPIServer.ipa" ]; then
          echo "✅ IPA criado com sucesso!"
          ls -lh build/RuanDevAPIServer.ipa
        else
          echo "❌ Erro ao criar IPA"
          exit 1
        fi
    
    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3
      with:
        name: RuanDevAPIServer-arm64.ipa
        path: build/RuanDevAPIServer.ipa
        retention-days: 90
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/RuanDevAPIServer.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "✅ IPA disponível em Releases"
