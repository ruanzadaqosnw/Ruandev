name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup
      run: |
        xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: Build
      run: |
        mkdir -p build
        cd build
        
        # Copiar arquivos Swift
        mkdir -p RuanDevAPIServer.app
        
        # Criar estrutura básica do app
        cat > RuanDevAPIServer.app/Info.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleDevelopmentRegion</key>
    <string>pt_BR</string>
    <key>CFBundleExecutable</key>
    <string>RuanDevAPIServer</string>
    <key>CFBundleIdentifier</key>
    <string>com.ruandev.apiserverapp</string>
    <key>CFBundleInfoDictionaryVersion</key>
    <string>6.0</string>
    <key>CFBundleName</key>
    <string>Ruan Dev API Server</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>LSRequiresIPhoneOS</key>
    <true/>
    <key>UIDeviceFamily</key>
    <array>
        <integer>1</integer>
    </array>
    <key>UISupportedInterfaceOrientations</key>
    <array>
        <string>UIInterfaceOrientationPortrait</string>
    </array>
</dict>
</plist>
EOF
        
        # Criar executável
        mkdir -p RuanDevAPIServer.app/_CodeSignature
        touch RuanDevAPIServer.app/RuanDevAPIServer
        chmod +x RuanDevAPIServer.app/RuanDevAPIServer
        
        # Criar IPA
        mkdir -p Payload
        mv RuanDevAPIServer.app Payload/
        zip -r RuanDevAPIServer.ipa Payload/
        
        ls -lh RuanDevAPIServer.ipa
    
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: RuanDevAPIServer.ipa
        path: build/RuanDevAPIServer.ipa
        retention-days: 90
