name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Create IPA
      run: |
        # Criar estrutura
        mkdir -p build/Payload/RuanDevAPIServer.app/_CodeSignature
        
        # Info.plist
        cat > build/Payload/RuanDevAPIServer.app/Info.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>RuanDevAPIServer</string>
    <key>CFBundleIdentifier</key>
    <string>com.ruandev.apiserverapp</string>
    <key>CFBundleName</key>
    <string>Ruan Dev API Server</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>LSRequiresIPhoneOS</key>
    <true/>
</dict>
</plist>
EOF
        
        # Executável
        touch build/Payload/RuanDevAPIServer.app/RuanDevAPIServer
        chmod +x build/Payload/RuanDevAPIServer.app/RuanDevAPIServer
        
        # CodeResources
        cat > build/Payload/RuanDevAPIServer.app/_CodeSignature/CodeResources << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>files</key>
    <dict/>
    <key>rules</key>
    <dict>
        <key>.*</key>
        <true/>
    </dict>
</dict>
</plist>
EOF
        
        # Criar IPA
        cd build
        zip -r RuanDevAPIServer.ipa Payload/
        ls -lh RuanDevAPIServer.ipa
    
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: RuanDevAPIServer.ipa
        path: build/RuanDevAPIServer.ipa
